<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML Account Manager</title>
  <!-- Cropper.js CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0d0d2b 0%, #1a0a2e 50%, #0d0d2b 100%);
      display: flex; justify-content: center; align-items: center; padding: 20px;
    }
    .container { width: 100%; max-width: 480px; }
    .glass {
      background: rgba(255,255,255,0.05); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
      padding: 24px 20px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h2 { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #00d2ff, #a18cd1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 6px; }
    .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 20px; }
    .hidden { display: none !important; }
    input, button { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 14px; border: none; font-size: 16px; font-family: inherit; }
    input { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); color: #fff; outline: none; }
    input::placeholder { color: rgba(255,255,255,0.35); }
    input:focus { border-color: #00d2ff; box-shadow: 0 0 0 3px rgba(0,210,255,0.15); }
    .btn-primary { background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: #fff; font-weight: 700; cursor: pointer; }
    .btn-secondary { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; }
    .btn-danger { background: #e94560; cursor: pointer; }
    .btn-warning { background: #ffaa00; color: #1a1a2e; font-weight: 700; cursor: pointer; }
    .link { color: #00d2ff; text-decoration: none; font-weight: 600; cursor: pointer; }
    .logout-row { display: flex; justify-content: flex-end; margin-bottom: 10px; }
    .logout-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 8px 18px; border-radius: 24px; font-size: 14px; cursor: pointer; }
    .welcome { text-align: center; color: #ccc; margin-bottom: 16px; }
    .section-title { font-size: 16px; font-weight: 600; color: #ddd; margin-bottom: 12px; }
    .account-list { display: flex; flex-direction: column; gap: 12px; }
    .account-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 14px; display: flex; gap: 12px; align-items: flex-start; }
    .account-photo { width: 65px; height: 65px; border-radius: 14px; object-fit: cover; background: rgba(0,210,255,0.1); flex-shrink: 0; }
    .account-info { flex: 1; min-width: 0; }
    .account-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .account-nickname { color: #00d2ff; font-weight: 700; font-size: 17px; }
    .order { color: #ffaa00; margin-right: 4px; }
    .account-actions { display: flex; gap: 8px; }
    .icon-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .data-row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 13px; }
    .data-label { color: #aaa; font-weight: 600; min-width: 65px; text-transform: uppercase; }
    .data-value { color: #eee; word-break: break-all; flex: 1; }
    .copy-btn, .toggle-btn { padding: 4px 10px; border-radius: 14px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; }
    .copy-btn { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #1a1a2e; }
    .toggle-btn { background: rgba(255,255,255,0.15); color: #fff; margin-right: 4px; }
    .no-data { color: #666; text-align: center; padding: 20px; }
    pre { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 14px; color: #0f0; font-size: 13px; overflow-x: auto; margin-bottom: 10px; }
    .photo-preview { text-align: center; margin-bottom: 10px; }
    .photo-preview img { width: 70px; height: 70px; border-radius: 14px; object-fit: cover; border: 2px solid #00d2ff; }
    .file-label { display: block; text-align: center; color: #aaa; cursor: pointer; padding: 10px; background: rgba(255,255,255,0.04); border-radius: 12px; margin-bottom: 10px; }
    .reminder { background: rgba(255,170,0,0.15); border: 1px solid #ffaa00; border-radius: 12px; padding: 12px; margin-bottom: 15px; color: #ffaa00; font-size: 14px; text-align: center; }
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000;
    }
    .modal-content { background: #1e1e2f; border-radius: 20px; padding: 20px; max-width: 90%; max-height: 90%; width: 400px; }
    .modal-content img { max-width: 100%; display: block; }
    .crop-actions { display: flex; gap: 10px; margin-top: 15px; }
    .crop-actions button { flex: 1; }
    .btn-group { display: flex; gap: 10px; }
    .btn-group > * { flex: 1; }
  </style>
</head>
<body>
<div class="container">
  <!-- AUTH PAGE -->
  <div id="authPage">
    <div class="glass">
      <h2>🔐 ML Manager</h2>
      <p class="subtitle">Simpan banyak akun Mobile Legends</p>
      <div id="loginForm">
        <input type="text" id="loginUser" placeholder="Username" autocomplete="username">
        <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password">
        <button class="btn-primary" id="loginBtn">Masuk</button>
        <p style="text-align:center;color:#aaa;margin-top:12px;">Belum punya akun? <span class="link" id="showRegisterLink">Daftar</span></p>
      </div>
      <div id="registerForm" class="hidden">
        <input type="text" id="regUser" placeholder="Username" autocomplete="username">
        <input type="password" id="regPass" placeholder="Password" autocomplete="new-password">
        <button class="btn-primary" id="registerBtn">Buat Akun</button>
        <p style="text-align:center;color:#aaa;margin-top:12px;">Sudah punya akun? <span class="link" id="showLoginLink">Login</span></p>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">
    <div class="logout-row"><button class="logout-btn" id="logoutBtn">🚪 Keluar</button></div>
    <div class="glass">
      <h2>📊 Akun ML Saya</h2>
      <p class="welcome">Selamat datang, <span id="welcomeName"></span>!</p>
      <div id="backupReminder" class="reminder hidden">💡 Ingat untuk backup data kamu ke GitHub!</div>
      <button class="btn-primary" id="addAccountBtn">➕ Tambah Akun Baru</button>
      <div id="editForm" class="hidden" style="margin-top:16px;">
        <div class="section-title" id="formTitle">Tambah Akun</div>
        <div class="photo-preview"><img id="previewImg" src="" alt="Preview"></div>
        <label class="file-label">📁 Pilih Foto <input type="file" id="mlPhotoInput" accept="image/*" style="display:none;"></label>
        <input type="text" id="mlEmail" placeholder="📧 Email ML">
        <input type="password" id="mlPassword" placeholder="🔑 Password ML">
        <input type="text" id="mlDevice" placeholder="🆔 Device ID">
        <input type="text" id="mlNick" placeholder="👤 Nickname">
        <div style="display:flex;gap:10px;">
          <button class="btn-primary" id="saveAccountBtn" style="flex:1;">💾 Simpan</button>
          <button class="btn-secondary" id="cancelEditBtn" style="flex:1;">Batal</button>
        </div>
      </div>
    </div>

    <div class="glass">
      <div class="section-title">📋 Daftar Akun</div>
      <div id="accountList"><p class="no-data">Belum ada akun.</p></div>
    </div>

    <div class="glass">
      <div class="section-title">📤 Backup & Restore</div>
      <div class="btn-group">
        <button class="btn-secondary" id="exportDownloadBtn">📥 Download Backup</button>
        <button class="btn-secondary" id="importBtn">📤 Import Backup</button>
      </div>
      <input type="file" id="importFileInput" accept=".json" class="hidden">
      <pre id="exportJson" style="margin-top:10px;"></pre>
      <button class="btn-secondary" id="exportCopyBtn" style="margin-top:5px;">📋 Salin JSON</button>
    </div>
  </div>
</div>

<!-- Modal Crop -->
<div id="cropModal" class="modal hidden">
  <div class="modal-content">
    <div class="section-title" style="margin-bottom:10px;">✂️ Crop 1:1</div>
    <img id="cropImage" src="" alt="Crop">
    <div class="crop-actions">
      <button class="btn-primary" id="cropSubmitBtn">✅ Crop & Simpan</button>
      <button class="btn-secondary" id="cropCancelBtn">Batal</button>
    </div>
  </div>
</div>

<!-- Cropper.js JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
<script>
(function() {
  // ========== STORAGE KEYS ==========
  const STORAGE_USERS = 'ml_users_db';
  const STORAGE_SESSION = 'ml_current_user';
  const BACKUP_KEY_PREFIX = 'ml_last_backup_';

  // ========== UTILS ==========
  function getUsers() {
    try { return JSON.parse(localStorage.getItem(STORAGE_USERS)) || {}; }
    catch(e) { return {}; }
  }
  function saveUsers(users) { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }
  function simpleHash(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h |= 0; }
    return h.toString(16);
  }
  function getCurrentUser() { return localStorage.getItem(STORAGE_SESSION); }
  function getAccounts() {
    const u = getCurrentUser();
    if (!u) return [];
    const users = getUsers();
    return users[u]?.accounts || [];
  }
  function saveAccounts(accounts) {
    const u = getCurrentUser();
    if (!u) return;
    const users = getUsers();
    users[u].accounts = accounts;
    saveUsers(users);
  }
  function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // Backup timestamp
  function getLastBackupTime() {
    const u = getCurrentUser();
    return localStorage.getItem(BACKUP_KEY_PREFIX + u) || null;
  }
  function setLastBackupTime() {
    const u = getCurrentUser();
    localStorage.setItem(BACKUP_KEY_PREFIX + u, new Date().toISOString());
  }
  function shouldRemindBackup() {
    const last = getLastBackupTime();
    if (!last) return true; // belum pernah backup
    const lastDate = new Date(last);
    const now = new Date();
    const diffDays = (now - lastDate) / (1000 * 60 * 60 * 24);
    return diffDays > 7; // lebih dari 7 hari
  }

  // ========== UI ELEMENTS ==========
  const authPage = document.getElementById('authPage');
  const dashboard = document.getElementById('dashboard');
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');
  const loginBtn = document.getElementById('loginBtn');
  const registerBtn = document.getElementById('registerBtn');
  const showRegisterLink = document.getElementById('showRegisterLink');
  const showLoginLink = document.getElementById('showLoginLink');
  const logoutBtn = document.getElementById('logoutBtn');
  const welcomeName = document.getElementById('welcomeName');
  const addAccountBtn = document.getElementById('addAccountBtn');
  const editForm = document.getElementById('editForm');
  const formTitle = document.getElementById('formTitle');
  const previewImg = document.getElementById('previewImg');
  const mlPhotoInput = document.getElementById('mlPhotoInput');
  const mlEmail = document.getElementById('mlEmail');
  const mlPassword = document.getElementById('mlPassword');
  const mlDevice = document.getElementById('mlDevice');
  const mlNick = document.getElementById('mlNick');
  const saveAccountBtn = document.getElementById('saveAccountBtn');
  const cancelEditBtn = document.getElementById('cancelEditBtn');
  const accountList = document.getElementById('accountList');
  const exportJson = document.getElementById('exportJson');
  const exportDownloadBtn = document.getElementById('exportDownloadBtn');
  const exportCopyBtn = document.getElementById('exportCopyBtn');
  const importBtn = document.getElementById('importBtn');
  const importFileInput = document.getElementById('importFileInput');
  const backupReminder = document.getElementById('backupReminder');

  // Crop elements
  const cropModal = document.getElementById('cropModal');
  const cropImage = document.getElementById('cropImage');
  const cropSubmitBtn = document.getElementById('cropSubmitBtn');
  const cropCancelBtn = document.getElementById('cropCancelBtn');
  let cropper = null;
  let cropCallback = null;

  const DEFAULT_PHOTO = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2270%22 height=%2270%22%3E%3Crect width=%2270%22 height=%2270%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23aaa%22 font-size=%2232%22%3E📷%3C/text%3E%3C/svg%3E';

  let editingId = null;
  let currentPhotoData = '';

  function resetPhoto() {
    currentPhotoData = '';
    previewImg.src = DEFAULT_PHOTO;
    mlPhotoInput.value = '';
  }

  // ========== CROP ==========
  function openCropModal(imageSrc, onCrop) {
    cropImage.src = imageSrc;
    cropCallback = onCrop;
    cropModal.classList.remove('hidden');
    if (cropper) cropper.destroy();
    cropper = new Cropper(cropImage, {
      aspectRatio: 1,
      viewMode: 2,
      autoCropArea: 1,
      background: false,
    });
  }

  function closeCropModal() {
    cropModal.classList.add('hidden');
    if (cropper) { cropper.destroy(); cropper = null; }
    cropCallback = null;
  }

  cropSubmitBtn.onclick = () => {
    if (!cropper) return;
    const canvas = cropper.getCroppedCanvas({ width: 300, height: 300 });
    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
    if (cropCallback) cropCallback(dataUrl);
    closeCropModal();
  };

  cropCancelBtn.onclick = closeCropModal;

  mlPhotoInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      openCropModal(ev.target.result, (croppedData) => {
        currentPhotoData = croppedData;
        previewImg.src = croppedData;
      });
    };
    reader.readAsDataURL(file);
    mlPhotoInput.value = '';
  };

  // ========== AUTH ==========
  showRegisterLink.onclick = () => { loginForm.classList.add('hidden'); registerForm.classList.remove('hidden'); };
  showLoginLink.onclick = () => { registerForm.classList.add('hidden'); loginForm.classList.remove('hidden'); };

  registerBtn.onclick = () => {
    const u = document.getElementById('regUser').value.trim();
    const p = document.getElementById('regPass').value.trim();
    if (!u || !p) { alert('Isi username & password!'); return; }
    const users = getUsers();
    if (users[u]) { alert('Username sudah dipakai!'); return; }
    users[u] = { passHash: simpleHash(p), accounts: [] };
    saveUsers(users);
    alert('Berhasil daftar! Silakan login.');
    registerForm.classList.add('hidden');
    loginForm.classList.remove('hidden');
  };

  loginBtn.onclick = () => {
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value.trim();
    if (!u || !p) { alert('Isi username & password!'); return; }
    const users = getUsers();
    const user = users[u];
    if (!user || user.passHash !== simpleHash(p)) { alert('Username atau password salah!'); return; }
    localStorage.setItem(STORAGE_SESSION, u);
    showDashboard();
  };

  logoutBtn.onclick = () => {
    localStorage.removeItem(STORAGE_SESSION);
    dashboard.classList.add('hidden');
    authPage.classList.remove('hidden');
  };

  // ========== DASHBOARD ==========
  function showDashboard() {
    welcomeName.textContent = getCurrentUser();
    authPage.classList.add('hidden');
    dashboard.classList.remove('hidden');
    editForm.classList.add('hidden');
    renderAccounts();
    updateBackupReminder();
  }

  function updateBackupReminder() {
    if (shouldRemindBackup()) {
      backupReminder.classList.remove('hidden');
    } else {
      backupReminder.classList.add('hidden');
    }
  }

  addAccountBtn.onclick = () => {
    editingId = null;
    formTitle.textContent = '➕ Tambah Akun';
    mlEmail.value = '';
    mlPassword.value = '';
    mlDevice.value = '';
    mlNick.value = '';
    resetPhoto();
    editForm.classList.remove('hidden');
  };

  cancelEditBtn.onclick = () => { editForm.classList.add('hidden'); };

  saveAccountBtn.onclick = () => {
    const email = mlEmail.value.trim();
    const password = mlPassword.value.trim();
    const deviceId = mlDevice.value.trim();
    const nickname = mlNick.value.trim();
    const photo = currentPhotoData || '';

    if (!email && !password && !deviceId && !nickname && !photo) {
      alert('Isi minimal satu field!');
      return;
    }

    const accounts = getAccounts();
    if (editingId) {
      const idx = accounts.findIndex(a => a.id === editingId);
      if (idx !== -1) accounts[idx] = { id: editingId, email, password, deviceId, nickname, photo };
    } else {
      const newId = Date.now().toString(36) + Math.random().toString(36).substring(2);
      accounts.push({ id: newId, email, password, deviceId, nickname, photo });
    }
    saveAccounts(accounts);
    editForm.classList.add('hidden');
    renderAccounts();
    updateBackupReminder(); // data berubah, mungkin perlu ingatkan
  };

  // ========== RENDER ==========
  function copyText(text, label) {
    if (!text) { alert(label + ' kosong.'); return; }
    navigator.clipboard.writeText(text).then(() => alert('✅ ' + label + ' disalin!')).catch(() => alert('Gagal menyalin.'));
  }

  function renderAccounts() {
    const accounts = getAccounts();
    if (accounts.length === 0) {
      accountList.innerHTML = '<p class="no-data">Belum ada akun.</p>';
      exportJson.textContent = '[]';
      return;
    }

    let html = '<div class="account-list">';
    accounts.forEach((acc, idx) => {
      const order = idx + 1;
      const photoSrc = acc.photo || DEFAULT_PHOTO;
      html += `
        <div class="account-card" data-id="${acc.id}">
          <img class="account-photo" src="${photoSrc}" alt="Foto" onerror="this.src='${DEFAULT_PHOTO.replace(/'/g, "\\'")}'">
          <div class="account-info">
            <div class="account-header">
              <span class="account-nickname"><span class="order">#${order}</span> ${escapeHTML(acc.nickname || 'Tanpa Nick')}</span>
              <div class="account-actions">
                <button class="icon-btn edit-account-btn">✏️</button>
                <button class="icon-btn btn-danger delete-account-btn">🗑️</button>
              </div>
            </div>
            <div class="data-row">
              <span class="data-label">📧 Email</span>
              <span class="data-value">${escapeHTML(acc.email || '-')}</span>
              <button class="copy-btn copy-email-btn">📋</button>
            </div>
            <div class="data-row">
              <span class="data-label">🔑 Pass</span>
              <span class="data-value pass-masked">••••••</span>
              <span class="data-value pass-real hidden">${escapeHTML(acc.password || '')}</span>
              <button class="toggle-btn toggle-pass-btn">👁️</button>
              <button class="copy-btn copy-pass-btn">📋</button>
            </div>
            <div class="data-row">
              <span class="data-label">🆔 Device</span>
              <span class="data-value">${escapeHTML(acc.deviceId || '-')}</span>
              <button class="copy-btn copy-device-btn">📋</button>
            </div>
          </div>
        </div>
      `;
    });
    html += '</div>';
    accountList.innerHTML = html;

    // Event delegation
    accountList.querySelectorAll('.account-card').forEach(card => {
      const id = card.dataset.id;
      const acc = accounts.find(a => a.id === id);
      if (!acc) return;

      card.querySelector('.edit-account-btn').onclick = () => {
        editingId = id;
        formTitle.textContent = '✏️ Edit Akun';
        mlEmail.value = acc.email || '';
        mlPassword.value = acc.password || '';
        mlDevice.value = acc.deviceId || '';
        mlNick.value = acc.nickname || '';
        if (acc.photo) { currentPhotoData = acc.photo; previewImg.src = acc.photo; }
        else { resetPhoto(); }
        mlPhotoInput.value = '';
        editForm.classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      card.querySelector('.delete-account-btn').onclick = () => {
        if (!confirm('Yakin hapus akun ini?')) return;
        const updated = getAccounts().filter(a => a.id !== id);
        saveAccounts(updated);
        renderAccounts();
        updateBackupReminder();
      };

      card.querySelector('.copy-email-btn').onclick = () => copyText(acc.email, 'Email');
      card.querySelector('.copy-pass-btn').onclick = () => copyText(acc.password, 'Password');
      card.querySelector('.copy-device-btn').onclick = () => copyText(acc.deviceId, 'Device ID');

      const toggleBtn = card.querySelector('.toggle-pass-btn');
      const masked = card.querySelector('.pass-masked');
      const real = card.querySelector('.pass-real');
      toggleBtn.onclick = () => {
        if (real.classList.contains('hidden')) {
          real.classList.remove('hidden');
          masked.classList.add('hidden');
          toggleBtn.textContent = '🙈';
        } else {
          real.classList.add('hidden');
          masked.classList.remove('hidden');
          toggleBtn.textContent = '👁️';
        }
      };
    });

    exportJson.textContent = JSON.stringify(accounts, null, 2);
  }

  // ========== BACKUP & RESTORE ==========
  function downloadBackup() {
    const accounts = getAccounts();
    const dataStr = JSON.stringify(accounts, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'ml_backup.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setLastBackupTime();
    updateBackupReminder();
  }

  exportDownloadBtn.onclick = downloadBackup;

  exportCopyBtn.onclick = () => {
    const accounts = getAccounts();
    if (accounts.length === 0) { alert('Tidak ada data.'); return; }
    copyText(JSON.stringify(accounts, null, 2), 'JSON');
  };

  importBtn.onclick = () => importFileInput.click();

  importFileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error('Format salah');
        if (!confirm('Import akan mengganti semua data akun saat ini. Lanjutkan?')) return;
        saveAccounts(data);
        setLastBackupTime();
        renderAccounts();
        updateBackupReminder();
        alert('Data berhasil diimport!');
      } catch (error) {
        alert('File tidak valid. Pastikan file JSON yang benar.');
      }
    };
    reader.readAsText(file);
    importFileInput.value = '';
  };

  // ========== INIT ==========
  if (getCurrentUser()) {
