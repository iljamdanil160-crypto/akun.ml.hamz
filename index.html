<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML Account Manager</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0d0d2b 0%, #1a0a2e 50%, #0d0d2b 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 28px 24px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    h2 {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #00d2ff, #a18cd1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .hidden {
      display: none !important;
    }

    .input-group {
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      transition: all 0.3s ease;
      outline: none;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    input:focus {
      border-color: #00d2ff;
      box-shadow: 0 0 0 4px rgba(0, 210, 255, 0.1);
      background: rgba(255, 255, 255, 0.08);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00d2ff, #3a7bd5);
      color: #fff;
      box-shadow: 0 6px 20px rgba(0, 210, 255, 0.25);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(0, 210, 255, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .link-text {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      margin-top: 16px;
    }

    .link {
      color: #00d2ff;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s;
    }

    .link:hover {
      color: #a18cd1;
    }

    .logout-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .logout-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      padding: 8px 18px;
      border-radius: 24px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .logout-btn:hover {
      background: rgba(255, 80, 80, 0.2);
      border-color: rgba(255, 80, 80, 0.4);
    }

    .welcome {
      text-align: center;
      color: #ccc;
      margin-bottom: 20px;
      font-size: 15px;
    }

    .welcome span {
      color: #00d2ff;
      font-weight: 700;
    }

    /* Data item grid */
    .data-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .data-item {
      display: grid;
      grid-template-columns: 100px 1fr auto;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 12px 16px;
    }

    .data-label {
      font-weight: 600;
      color: #aaa;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .data-value {
      color: #eee;
      word-break: break-all;
      overflow-wrap: anywhere;
      line-height: 1.4;
      font-size: 15px;
      min-width: 0; /* agar bisa mengecil */
    }

    .data-value input {
      background: transparent;
      border: none;
      color: #eee;
      font-size: 15px;
      padding: 0;
      width: 100%;
      outline: none;
      font-family: inherit;
    }

    .action-btns {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-self: end;
    }

    .copy-btn, .toggle-btn {
      border: none;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .copy-btn {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #1a1a2e;
      font-weight: 700;
    }

    .copy-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
    }

    .toggle-btn {
      background: rgba(255,255,255,0.15);
      padding: 6px 10px;
      font-size: 16px;
      line-height: 1;
      color: #fff;
    }

    .toggle-btn:hover {
      background: rgba(255,255,255,0.25);
    }

    pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 16px;
      border-radius: 14px;
      color: #0f0;
      font-size: 13px;
      overflow-x: auto;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #ddd;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .no-data {
      color: #666;
      font-style: italic;
      text-align: center;
      padding: 20px;
    }

    /* Responsive untuk layar kecil */
    @media (max-width: 400px) {
      .data-item {
        grid-template-columns: 80px 1fr;
      }
      .action-btns {
        grid-column: 2;
        justify-self: start;
        margin-top: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HALAMAN LOGIN & REGISTER -->
    <div id="authPage">
      <div class="glass">
        <h2>🔐 ML Manager</h2>
        <p class="subtitle">Simpan akun Mobile Legends dengan aman</p>

        <div id="loginForm">
          <div class="input-group">
            <input type="text" id="loginUser" placeholder="Username" autocomplete="username" />
          </div>
          <div class="input-group">
            <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password" />
          </div>
          <button class="btn btn-primary" onclick="login()">Masuk</button>
          <p class="link-text">Belum punya akun? <span class="link" onclick="showRegister()">Daftar di sini</span></p>
        </div>

        <div id="registerForm" class="hidden">
          <div class="input-group">
            <input type="text" id="regUser" placeholder="Username" autocomplete="username" />
          </div>
          <div class="input-group">
            <input type="password" id="regPass" placeholder="Password" autocomplete="new-password" />
          </div>
          <button class="btn btn-primary" onclick="register()">Buat Akun</button>
          <p class="link-text">Sudah punya akun? <span class="link" onclick="showLogin()">Login</span></p>
        </div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden">
      <div class="logout-row">
        <button class="logout-btn" onclick="logout()">🚪 Keluar</button>
      </div>

      <div class="glass">
        <h2>📊 Data Akun ML</h2>
        <p class="welcome">Selamat datang, <span id="welcomeName"></span>!</p>

        <div class="section-title">➕ Tambah / Edit Data</div>
        <div class="input-group">
          <input type="text" id="mlEmail" placeholder="📧 Email ML" />
        </div>
        <div class="input-group">
          <input type="password" id="mlPassword" placeholder="🔑 Password ML" />
        </div>
        <div class="input-group">
          <input type="text" id="mlDevice" placeholder="🆔 Device ID" />
        </div>
        <div class="input-group">
          <input type="text" id="mlNick" placeholder="👤 Nickname" />
        </div>
        <button class="btn btn-primary" onclick="saveMLData()">💾 Simpan Data</button>
      </div>

      <!-- Data Tersimpan -->
      <div class="glass" id="savedDataCard">
        <div class="section-title">📋 Data Tersimpan</div>
        <div id="mlDataDisplay"><p class="no-data">Belum ada data.</p></div>
      </div>

      <!-- Ekspor -->
      <div class="glass">
        <div class="section-title">📤 Ekspor JSON</div>
        <pre id="exportJson">{}</pre>
        <button class="btn btn-secondary" onclick="exportData()">📋 Salin JSON</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_USERS = 'ml_users_db';
    const STORAGE_SESSION = 'ml_current_user';

    function getUsers() {
      return JSON.parse(localStorage.getItem(STORAGE_USERS)) || {};
    }
    function saveUsers(users) {
      localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
    }
    function hash(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = ((h << 5) - h) + str.charCodeAt(i);
        h |= 0;
      }
      return h.toString(16);
    }

    function showRegister() {
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('registerForm').classList.remove('hidden');
    }
    function showLogin() {
      document.getElementById('registerForm').classList.add('hidden');
      document.getElementById('loginForm').classList.remove('hidden');
    }

    function register() {
      const u = document.getElementById('regUser').value.trim();
      const p = document.getElementById('regPass').value.trim();
      if (!u || !p) return alert('Isi username & password!');
      const users = getUsers();
      if (users[u]) return alert('Username sudah dipakai!');
      users[u] = { passHash: hash(p), mlData: null };
      saveUsers(users);
      alert('Berhasil daftar! Silakan login.');
      showLogin();
    }

    function login() {
      const u = document.getElementById('loginUser').value.trim();
      const p = document.getElementById('loginPass').value.trim();
      if (!u || !p) return alert('Isi username & password!');
      const users = getUsers();
      const user = users[u];
      if (!user || user.passHash !== hash(p)) return alert('Username/password salah!');
      localStorage.setItem(STORAGE_SESSION, u);
      showDashboard();
    }

    function logout() {
      localStorage.removeItem(STORAGE_SESSION);
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('authPage').classList.remove('hidden');
    }

    function getCurrentUser() {
      return localStorage.getItem(STORAGE_SESSION);
    }

    function showDashboard() {
      const u = getCurrentUser();
      document.getElementById('authPage').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('welcomeName').textContent = u;
      loadMLData();
    }

    function getMLData() {
      const u = getCurrentUser();
      if (!u) return null;
      const users = getUsers();
      return users[u]?.mlData || null;
    }

    function saveMLData() {
      const u = getCurrentUser();
      if (!u) return alert('Session habis, login ulang.');
      const mlData = {
        email: document.getElementById('mlEmail').value.trim(),
        password: document.getElementById('mlPassword').value.trim(),
        deviceId: document.getElementById('mlDevice').value.trim(),
        nickname: document.getElementById('mlNick').value.trim()
      };
      const users = getUsers();
      users[u].mlData = mlData;
      saveUsers(users);
      alert('Data ML tersimpan!');
      loadMLData();
    }

    function copyText(text, label) {
      if (!text) return alert(label + ' kosong.');
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => alert('✅ ' + label + ' disalin!'));
      } else {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('✅ ' + label + ' disalin!');
      }
    }

    window.togglePassword = function(id, iconId) {
      const el = document.getElementById(id);
      const icon = document.getElementById(iconId);
      if (el.type === 'password') {
        el.type = 'text';
        if (icon) icon.textContent = '🙈';
      } else {
        el.type = 'password';
        if (icon) icon.textContent = '👁️';
      }
    };

    function loadMLData() {
      const mlData = getMLData();
      const display = document.getElementById('mlDataDisplay');
      const exportPre = document.getElementById('exportJson');

      if (!mlData || Object.values(mlData).every(v => !v)) {
        display.innerHTML = '<p class="no-data">Belum ada data.</p>';
        exportPre.textContent = '{}';
        return;
      }

      const escapeJS = (str) => (str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
      const safeEmail = escapeJS(mlData.email);
      const safePass = escapeJS(mlData.password);
      const safeDevice = escapeJS(mlData.deviceId);
      const safeNick = escapeJS(mlData.nickname);

      const passFieldId = 'passField_' + Date.now();

      display.innerHTML = `
        <div class="data-list">
          <div class="data-item">
            <span class="data-label">📧 Email</span>
            <span class="data-value">${mlData.email || '-'}</span>
            <div class="action-btns">
              <button class="copy-btn" onclick="copyText('${safeEmail}', 'Email')">📋</button>
            </div>
          </div>
          <div class="data-item">
            <span class="data-label">🔑 Password</span>
            <div class="data-value">
              <input type="password" value="${mlData.password || ''}" id="${passFieldId}" readonly />
            </div>
            <div class="action-btns">
              <button class="toggle-btn" onclick="togglePassword('${passFieldId}', 'icon_${passFieldId}')" id="icon_${passFieldId}">👁️</button>
              <button class="copy-btn" onclick="copyText('${safePass}', 'Password')">📋</button>
            </div>
          </div>
          <div class="data-item">
            <span class="data-label">🆔 Device ID</span>
            <span class="data-value">${mlData.deviceId || '-'}</span>
            <div class="action-btns">
              <button class="copy-btn" onclick="copyText('${safeDevice}', 'Device ID')">📋</button>
            </div>
          </div>
          <div class="data-item">
            <span class="data-label">👤 Nickname</span>
            <span class="data-value">${mlData.nickname || '-'}</span>
            <div class="action-btns">
              <button class="copy-btn" onclick="copyText('${safeNick}', 'Nickname')">📋</button>
            </div>
          </div>
        </div>
      `;

      exportPre.textContent = JSON.stringify(mlData, null, 2);
    }

    function exportData() {
      const mlData = getMLData();
      if (!mlData) return alert('Tidak ada data.');
      copyText(JSON.stringify(mlData, null, 2), 'JSON');
    }

    window.onload = function() {
      if (getCurrentUser()) {
        showDashboard();
      } else {
        document.getElementById('authPage').classList.remove('hidden');
        document.getElementById('dashboard').classList.add('hidden');
      }
    };
  </script>
</body>
</html>
